x-backend-build: &backend-build
  context: ./backend
  dockerfile: Dockerfile

x-backend-environment: &backend-environment
  APP_ENV: ${APP_ENV:-docker}
  APP_NAME: ${APP_NAME:-Xiyangyang Clock}
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-voice_calendar}
  REDIS_URL: redis://redis:6379/0
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  TIMEZONE: ${TIMEZONE:-Asia/Shanghai}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  WS_HEARTBEAT_INTERVAL: ${WS_HEARTBEAT_INTERVAL:-30}
  REMINDER_SCAN_INTERVAL: ${REMINDER_SCAN_INTERVAL:-60}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voice_calendar}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  db-init:
    image: xiyangyang-clock-backend
    build: *backend-build
    environment: *backend-environment
    command: ["python", "-m", "scripts.init_db"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    image: xiyangyang-clock-backend
    build: *backend-build
    restart: unless-stopped
    environment: *backend-environment
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    image: xiyangyang-clock-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5173}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:5173/ws}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
